<!-- ── FILTERS ────────────────────────────────────────────────────────────────── -->
<section class="bg-white border-b border-gray-100 sticky top-16 z-30 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 space-y-2.5">
    <!-- Row 1: operation chips + search + sort -->
    <div class="flex flex-wrap items-center gap-2.5">
      <div class="flex items-center gap-1.5">
        <button id="fAll"  onclick="setFilter('operation','')"      class="filter-chip text-xs font-semibold px-3.5 py-2 rounded-full brand-bg text-white">Todo</button>
        <button id="fSale" onclick="setFilter('operation','sale')"  class="filter-chip text-xs font-semibold px-3.5 py-2 rounded-full border border-gray-200 text-gray-600 hover:border-gray-300">Comprar</button>
        <button id="fRent" onclick="setFilter('operation','rent')"  class="filter-chip text-xs font-semibold px-3.5 py-2 rounded-full border border-gray-200 text-gray-600 hover:border-gray-300">Alquilar</button>
      </div>
      <div class="flex items-center gap-1.5 border border-gray-200 rounded-full px-3.5 py-2 bg-white hover:border-gray-300 transition flex-1 min-w-[180px]">
        <svg class="w-3.5 h-3.5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="fZone" type="text" placeholder="Buscá por barrio, dirección o palabra…" onkeydown="if(event.key==='Enter') applyFilters()" class="text-xs font-medium focus:outline-none w-full text-gray-600 placeholder-gray-400 bg-transparent"/>
      </div>
      <select id="fSort" onchange="applyFilters()" class="text-xs font-semibold border border-gray-200 rounded-full px-3.5 py-2 focus:outline-none text-gray-600 bg-white cursor-pointer hover:border-gray-300">
        <option value="recent">Más recientes</option>
        <option value="price_asc">Precio: menor a mayor</option>
        <option value="price_desc">Precio: mayor a menor</option>
      </select>
    </div>
    <!-- Row 2: refined filters -->
    <div class="flex flex-wrap items-center gap-2">
      <select id="fZoneSel" onchange="document.getElementById('fZone').value='';applyFilters()" class="filter-sel">
        <option value="">Todos los barrios</option>
      </select>
      <select id="fType" onchange="applyFilters()" class="filter-sel">
        <option value="">Tipo de vivienda</option>
        <option value="house">Casa</option>
        <option value="apartment">Departamento</option>
        <option value="land">Terreno</option>
        <option value="commercial">Comercial</option>
        <option value="office">Oficina</option>
        <option value="warehouse">Depósito</option>
      </select>
      <select id="fBeds" onchange="applyFilters()" class="filter-sel">
        <option value="">Ambientes/Hab.</option>
        <option value="1">1+</option><option value="2">2+</option><option value="3">3+</option><option value="4">4+</option>
      </select>
      <select id="fBaths" onchange="applyFilters()" class="filter-sel">
        <option value="">Baños</option>
        <option value="1">1+</option><option value="2">2+</option><option value="3">3+</option>
      </select>
      <input id="fMinPrice" type="number" placeholder="Precio mín." oninput="debouncedApply()" class="filter-sel w-28" />
      <input id="fMaxPrice" type="number" placeholder="Precio máx." oninput="debouncedApply()" class="filter-sel w-28" />
      <button onclick="clearFilters()" class="text-xs text-gray-400 hover:text-gray-600 font-medium px-2">Limpiar</button>
      <span id="resultCount" class="text-xs font-medium text-gray-400 ml-auto"></span>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const slug   = location.pathname.split('/portal/')[1]?.split('/')[0] || '';
const API    = location.origin;
let portal   = {};
let filters  = { operation: '', type: '', zone: '', beds: '', baths: '', minPrice: '', maxPrice: '', sort: 'recent', page: 1 };
let totalPages = 1;
let _zonesLoaded = false;

// Default real-estate hero images (used when agency hasn't uploaded any)
const DEFAULT_HERO_IMAGES = [

// ── Helpers ──────────────────────────────────────────────────────────────────
/** Escape text before inserting into innerHTML (prevents stored XSS). */
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
/** Normalize a phone string into a wa.me-compatible international number. */
function waNumber(raw) { return (raw || '').replace(/\D/g, '').replace(/^0+/, ''); }
function waLink(raw, text) {
  const n = waNumber(raw);
  if (!n) return '';
  return `https://wa.me/${n}${text ? `?text=${encodeURIComponent(text)}` : ''}`;
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function init() {
  if (!slug) { document.body.innerHTML = '<p style="text-align:center;padding:40px;color:#999">Portal no encontrado</p>'; return; }
  renderSkeletons();
  await loadListing();
}

// ── API ────────────────────────────────────────────────────────────────────
async function fetchListing() {
  const params = new URLSearchParams();
  if (filters.operation) params.set('operation', filters.operation);
  if (filters.type)      params.set('type',     filters.type);
  if (filters.zone)      params.set('zone',     filters.zone);
  if (filters.beds)      params.set('beds',     filters.beds);
  if (filters.baths)     params.set('baths',    filters.baths);
  if (filters.minPrice)  params.set('minPrice', filters.minPrice);
  if (filters.maxPrice)  params.set('maxPrice', filters.maxPrice);
  if (filters.sort)      params.set('sort',     filters.sort);
  params.set('page', filters.page);
  const resp = await fetch(`${API}/api/portal/${slug}?${params}`);
  if (!resp.ok) {
    let msg = 'Error al cargar propiedades';
    try { msg = (await resp.json()).error || msg; } catch {}
    const e = new Error(msg); e.status = resp.status; throw e;
  }
  return resp.json();
}

async function loadListing() {
  try {
    const data = await fetchListing();
    portal     = data.portal;
    totalPages = data.pagination.pages;
    applyBranding(portal);
    populateZones(data.zones || []);
    renderProperties(data.properties, data.pagination);
  } catch (err) {
    const unavailable = err.status === 404;
    document.getElementById('propGrid').innerHTML =
      `<div class="col-span-4 text-center py-24">
        <svg class="w-16 h-16 mx-auto mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10.5L12 4l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/></svg>
        <p class="text-gray-500 font-semibold text-lg">${unavailable ? 'Este portal no está disponible' : 'No se pudo cargar el portal'}</p>
        <p class="text-gray-400 text-sm mt-1">${unavailable ? 'Es posible que esté temporalmente fuera de línea. Volvé a intentar más tarde.' : err.message}</p>
      </div>`;
    // Hide filters/contact when unavailable
    if (unavailable) {
      document.querySelectorAll('section, footer').forEach(el => { if (el.id !== 'hero') el.style.display = 'none'; });
    }
  }
}

// ── Branding ────────────────────────────────────────────────────────────────
function applyBranding(p) {
  document.documentElement.style.setProperty('--primary', p.primaryColor || '#6366F1');
  document.documentElement.style.setProperty('--primary-dark',
    (p.secondaryColor && p.secondaryColor.trim()) ? p.secondaryColor : shade(p.primaryColor || '#6366F1', -18));
  // Hero darkness (overlay)
  const ov = (typeof p.heroOverlay === 'number') ? p.heroOverlay : 45;
  const heroOv = document.getElementById('heroOverlay');
  if (heroOv) heroOv.style.background =
    `linear-gradient(135deg, rgba(0,0,0,${(ov/100).toFixed(2)}) 0%, rgba(0,0,0,${(Math.max(0,ov-20)/100).toFixed(2)}) 100%)`;
  document.title = (p.agencyName || 'Portal') + ' — Propiedades';
  document.getElementById('pageDesc').content    = p.tagline || 'Propiedades en venta y alquiler';
  document.getElementById('navAgencyName').textContent = p.agencyName || '';
  document.getElementById('navLogoImg').textContent    = (p.agencyName||'A')[0].toUpperCase();
  document.getElementById('heroTitle').textContent     = p.agencyName || 'Nuestras Propiedades';
  document.getElementById('heroTagline').textContent   = p.tagline || 'Encontrá la propiedad ideal con nuestro equipo de asesores.';
  document.getElementById('footerAgency').textContent  = p.agencyName || '';
  document.getElementById('footerContact').textContent = [p.whatsapp, p.email].filter(Boolean).join('  ·  ');

  // Hero carousel (agency images or defaults)
  initHeroCarousel(p.heroImages);

  // WhatsApp links (nav + floating button)
  const link = waLink(p.whatsapp, `Hola ${p.agencyName || ''}, vi su portal de propiedades y quiero más información.`);
  if (link) {
    const nav = document.getElementById('navWhatsApp');
    nav.href = link; nav.classList.remove('hidden');
    const flo = document.getElementById('waFloat');
    flo.href = link; flo.classList.remove('hidden');
  }

  // Logo: image > emoji > initial
  const navLogo = document.getElementById('navLogoImg');
  const hl = document.getElementById('heroLogo');
  if (p.logoUrl) {
    navLogo.innerHTML = `<img src="${p.logoUrl}" class="w-full h-full object-cover rounded-xl"/>`;
    hl.innerHTML = `<img src="${p.logoUrl}" class="w-full h-full object-cover"/>`;
    hl.classList.remove('hidden'); hl.classList.add('flex');
  } else if (p.logoEmoji) {
    navLogo.textContent = p.logoEmoji;
    hl.innerHTML = `<span style="font-size:34px">${esc(p.logoEmoji)}</span>`;
    hl.classList.remove('hidden'); hl.classList.add('flex');
  }

  // Hero font + entrance animation
  const title = document.getElementById('heroTitle');
  if (p.heroFont)      title.classList.add('hf-' + p.heroFont);
  if (p.heroAnimation) { void title.offsetWidth; title.classList.add('ha-' + p.heroAnimation); }

  applyLayout(p.layout || {});
  renderSections(p.sections || {}, p);
}

// ── Layout & visibility ───────────────────────────────────────────────────────

  document.body.classList.toggle('portal-dark', !!lay.darkMode);

}

// ── Hero carousel ─────────────────────────────────────────────────────────────
function initHeroCarousel(images) {
  const imgs = (images && images.length) ? images : DEFAULT_HERO_IMAGES;
  const track = document.getElementById('heroCarousel');
  const dots  = document.getElementById('heroDots');
  if (!track) return;

  track.innerHTML = imgs.map((url, i) =>
    `<div class="hero-slide ${i===0?'active':''}" style="background-image:url('${url}')"></div>`
  ).join('');

  // Single image → no dots / no autoplay
  if (imgs.length <= 1) { dots.innerHTML = ''; return; }

  dots.innerHTML = imgs.map((_, i) =>
    `<button class="hero-dot ${i===0?'active':''}" onclick="goHeroSlide(${i})" aria-label="Imagen ${i+1}"></button>`
  ).join('');

  _heroIdx = 0;
  clearInterval(_heroTimer);
  _heroTimer = setInterval(() => goHeroSlide(_heroIdx + 1), 5000);
}

function goHeroSlide(idx) {
  const slides = document.querySelectorAll('.hero-slide');
  const dots   = document.querySelectorAll('.hero-dot');
  if (!slides.length) return;
  _heroIdx = (idx + slides.length) % slides.length;
  slides.forEach((s, i) => s.classList.toggle('active', i === _heroIdx));
  dots.forEach((d, i) => d.classList.toggle('active', i === _heroIdx));
}

/** Lighten/darken a hex color by percent (-100..100) */
function shade(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  if (isNaN(n)) return hex;
  let r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  const f = pct/100;
  r = Math.round(r + (f<0 ? r : 255-r)*f);
  g = Math.round(g + (f<0 ? g : 255-g)*f);
  b = Math.round(b + (f<0 ? b : 255-b)*f);
  return '#' + [r,g,b].map(x => Math.max(0,Math.min(255,x)).toString(16).padStart(2,'0')).join('');
}

// ── Filters ────────────────────────────────────────────────────────────────
function populateZones(zones) {
  if (_zonesLoaded || !zones.length) return;
  _zonesLoaded = true;
  const sel = document.getElementById('fZoneSel');
  zones.forEach(z => { const o = document.createElement('option'); o.value = z; o.textContent = z; sel.appendChild(o); });
}

function setFilter(key, val) {
  filters[key] = val; filters.page = 1;
  if (key === 'operation') {
    ['fAll','fSale','fRent'].forEach(id => {
      const btn = document.getElementById(id);
      btn.classList.remove('brand-bg','text-white');
      btn.classList.add('text-gray-600','border','border-gray-200');
    });
    const active = val === 'sale' ? 'fSale' : val === 'rent' ? 'fRent' : 'fAll';
    const ab = document.getElementById(active);
    ab.classList.add('brand-bg','text-white');
    ab.classList.remove('text-gray-600','border','border-gray-200');
  }
  loadListing();
}

/** Read every filter control and reload. */
function applyFilters() {
  const v = id => document.getElementById(id).value.trim();
  filters.zone     = v('fZone') || v('fZoneSel');
  filters.type     = v('fType');
  filters.beds     = v('fBeds');
  filters.baths    = v('fBaths');
  filters.minPrice = v('fMinPrice');
  filters.maxPrice = v('fMaxPrice');
  filters.sort     = v('fSort') || 'recent';
  filters.page     = 1;
  loadListing();
}

let _applyTimer = null;
function debouncedApply() { clearTimeout(_applyTimer); _applyTimer = setTimeout(applyFilters, 500); }

function clearFilters() {
  filters = { operation:'', type:'', zone:'', beds:'', baths:'', minPrice:'', maxPrice:'', sort:'recent', page:1 };
  ['fZone','fZoneSel','fType','fBeds','fBaths','fMinPrice','fMaxPrice'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('fSort').value = 'recent';
  setFilter('operation','');
}
function changePage(dir) { filters.page = Math.max(1, Math.min(totalPages, filters.page + dir)); loadListing(); window.scrollTo({top:0,behavior:'smooth'}); }
function scrollToContact() { document.getElementById('contact').scrollIntoView({behavior:'smooth'}); }

document.getElementById('contactForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('contactBtn');
  btn.disabled = true; btn.textContent = 'Enviando…';
  document.getElementById('contactSuccess').classList.add('hidden');
  document.getElementById('contactError').classList.add('hidden');
  try {
    const resp = await fetch(`${API}/api/portal/${slug}/contact`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:    document.getElementById('cName').value.trim(),
        phone:   document.getElementById('cPhone').value.trim(),
        email:   document.getElementById('cEmail').value.trim(),
        message: document.getElementById('cMsg').value.trim(),
      }),
    });
    if (!resp.ok) { const d = await resp.json(); throw new Error(d.error || 'Error al enviar'); }
    document.getElementById('contactSuccess').classList.remove('hidden');
    document.getElementById('contactForm').reset();
  } catch (err) {
    const el = document.getElementById('contactError');
    el.textContent = err.message; el.classList.remove('hidden');
  } finally { btn.disabled=false; btn.textContent='Enviar consulta'; }
};

// ── Portal AI assistant ───────────────────────────────────────────────────────
let _paHistory = [];
function togglePortalBot() {
  const panel = document.getElementById('paPanel');
  const open = panel.classList.contains('hidden');
  panel.classList.toggle('hidden', !open);
  panel.classList.toggle('flex', open);
  document.getElementById('paBtn').style.display = open ? 'none' : 'flex';
  if (open) {
    if (!document.getElementById('paMsgs').children.length) {
      addPortalMsg('assistant', `¡Hola! 👋 Soy el asistente de ${portal.agencyName || 'la inmobiliaria'}. Contame qué estás buscando (zona, tipo, presupuesto) y te muestro las mejores opciones.`);
    }
    setTimeout(() => document.getElementById('paInput').focus(), 100);
  }
}
function paLinkify(text) {
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // [[Título|<24-hex id>]] → link to the property detail
  return esc.replace(/\[\[([^\]|]+)\|([a-f0-9]{24})\]\]/gi,
    (_, title, id) => `<a href="/portal/${slug}/propiedad/${id}" target="_blank" style="color:var(--primary);font-weight:700;text-decoration:underline">${title} ›</a>`);
}
function addPortalMsg(role, text) {
  const wrap = document.getElementById('paMsgs');
  const me = role === 'user';
  const b = document.createElement('div');
  b.style.cssText = `max-width:85%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.45;white-space:pre-wrap;${me
    ? 'align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px'
    : 'align-self:flex-start;background:#fff;color:#1f2937;border:1px solid #e5e7eb;border-bottom-left-radius:4px'}`;
  if (me) b.textContent = text; else b.innerHTML = paLinkify(text);
  wrap.appendChild(b); wrap.scrollTop = wrap.scrollHeight;
  return b;
}
async function sendPortalBot() {
  const input = document.getElementById('paInput');
  const q = input.value.trim(); if (!q) return;
  input.value = '';
  addPortalMsg('user', q);
  _paHistory.push({ role: 'user', content: q });
  const typing = addPortalMsg('assistant', '…');
  try {
    const resp = await fetch(`${API}/api/portal/${slug}/assistant`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: _paHistory }),
    });
    const d = await resp.json();
    if (!resp.ok) throw new Error(d.error || 'Error');
    typing.innerHTML = paLinkify(d.reply);
    _paHistory.push({ role: 'assistant', content: d.reply });
    if (d.leadCaptured) addPortalMsg('assistant', '✅ ¡Listo! Un asesor te va a contactar a la brevedad.');
  } catch (err) { typing.textContent = 'Disculpá, no pude responder ahora. ' + (err.message || ''); }
}

fetch(`${API}/api/version`).then(r => r.json()).then(d => {
  const el = document.getElementById('appVersion');
  if (el && d.version) el.textContent = '· v' + d.version;
}).catch(() => {});
init();
