  <style>
    body { font-family: var(--font-body, 'Plus Jakarta Sans'), system-ui, sans-serif }

    :root { --primary: #6366F1; --primary-dark: #4F46E5 }
    .brand-bg   { background: var(--primary) }
    .brand-text { color: var(--primary) }
    .brand-grad { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%) }
    .photo-placeholder { background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%) }
    .skeleton { animation: pulse 1.5s ease-in-out infinite; background: #e5e7eb; border-radius:8px }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .feature-chip { background:#F3F4F6; color:#374151; border-radius:999px; font-size:12px; font-weight:600; padding:6px 14px; display:inline-flex; align-items:center; gap:5px }
    .feature-chip::before { content:'✓'; color:var(--primary); font-weight:800 }
    .wa-float { box-shadow: 0 8px 24px rgba(37,211,102,.45); animation: wa-pop .4s ease }

    .wa-float:hover { transform: scale(1.07) }
    /* Dark mode (set via body.portal-dark) */
    body.portal-dark { background:#0f172a; color:#e2e8f0 }
    body.portal-dark .bg-white { background:#1e293b !important }
    body.portal-dark .bg-gray-50, body.portal-dark .bg-gray-100 { background:#0f172a !important }
    body.portal-dark .text-gray-900 { color:#f1f5f9 !important }
    body.portal-dark .text-gray-800 { color:#e2e8f0 !important }
    body.portal-dark .text-gray-700, body.portal-dark .text-gray-600 { color:#cbd5e1 !important }
    body.portal-dark .text-gray-500, body.portal-dark .text-gray-400 { color:#94a3b8 !important }
    body.portal-dark .border-gray-100, body.portal-dark .border-gray-200 { border-color:#334155 !important }
    body.portal-dark .feature-chip { background:#334155; color:#e2e8f0 }
    body.portal-dark .photo-placeholder { background:linear-gradient(135deg,#1e293b,#334155) }
    body.portal-dark input, body.portal-dark textarea, body.portal-dark select { background:#1e293b; color:#e2e8f0 }
    .cards-sharp .sim-card { border-radius:0 !important }
    .cards-flat  .sim-card { box-shadow:none !important }
    /* Global corner radius */
    :root { --radius: 16px }
    .sim-card, #contactCard input, #contactCard textarea, #contactBtn { border-radius: var(--radius) !important }
    /* Button styles */
    .btn-outline #contactBtn { background:#fff !important; color:var(--primary) !important; border:2px solid var(--primary) }
    .btn-pill #contactBtn { border-radius:9999px !important }
    /* Density */
    .density-spacious main { padding-top:2rem }
    .density-compact  main { padding-top:.5rem }
    /* ZonaProp-style photo mosaic */
    .gallery-mosaic { display: grid; gap: 8px; height: clamp(300px, 46vh, 460px); grid-template-columns: 1fr; border-radius: 16px; overflow: hidden }
    .gallery-mosaic img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s ease }
    .gallery-mosaic > div:hover img { transform: scale(1.04) }
    .gallery-mosaic .g-thumb { display: none }
    @media (min-width: 768px) {
      .gallery-mosaic { grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 1fr 1fr }
      .gallery-mosaic .g-big { grid-row: 1 / span 2 }
      .gallery-mosaic .g-thumb { display: block }
    }

  </div>
  <div id="paMsgs" class="flex-1 overflow-y-auto p-3.5 flex flex-col gap-2.5" style="background:#F7F7FA"></div>
  <div class="p-2.5 border-t border-gray-100 flex gap-2 bg-white flex-shrink-0">
    <input id="paInput" type="text" placeholder="Escribí tu consulta…" onkeydown="if(event.key==='Enter')sendPortalBot()" class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2" style="--tw-ring-color:var(--primary)"/>
    <button onclick="sendPortalBot()" class="brand-grad text-white rounded-xl px-3.5" title="Enviar"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg></button>
  </div>
</div>

<script>
const pathParts = location.pathname.split('/');
const slug      = pathParts[2] || '';
const propId    = pathParts[4] || '';
const API       = location.origin;
let currentPhotoIdx = 0;
let photos      = [];
let portalCfg   = {};

const TYPE_LABELS   = { house:'Casa', apartment:'Departamento', land:'Terreno', commercial:'Comercial', office:'Oficina', warehouse:'Depósito' };
const OP_LABELS     = { sale:'En Venta', rent:'En Alquiler' };
const OP_COLORS     = { sale:'bg-blue-100 text-blue-700', rent:'bg-green-100 text-green-700' };
const STATUS_LABELS = { available:'Disponible', reserved:'Reservada', sold:'Vendida' };
const STATUS_COLORS = { available:'bg-green-100 text-green-700', reserved:'bg-amber-100 text-amber-700', sold:'bg-red-100 text-red-500' };

// ── WhatsApp / color helpers ──────────────────────────────────────────────────
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function waNumber(raw) { return (raw || '').replace(/\D/g, '').replace(/^0+/, ''); }
function waLink(raw, text) {
  const n = waNumber(raw);
  if (!n) return '';
  return `https://wa.me/${n}${text ? `?text=${encodeURIComponent(text)}` : ''}`;
}
function shade(hex, pct) {
  const n = parseInt((hex||'').replace('#',''), 16);
  if (isNaN(n)) return hex;
  let r = (n>>16)&255, g = (n>>8)&255, b = n&255; const f = pct/100;
  r = Math.round(r + (f<0 ? r : 255-r)*f);
  g = Math.round(g + (f<0 ? g : 255-g)*f);
  b = Math.round(b + (f<0 ? b : 255-b)*f);
  return '#' + [r,g,b].map(x => Math.max(0,Math.min(255,x)).toString(16).padStart(2,'0')).join('');
}

async function init() {
  if (!slug || !propId) { showError('URL inválida'); return; }
  try {
    const resp = await fetch(`${API}/api/portal/${slug}/property/${propId}`);
    if (!resp.ok) throw new Error('Propiedad no encontrada');
    const { portal, property, similar } = await resp.json();
    applyBranding(portal);
    renderProperty(property, portal);
    renderSimilar(similar || []);
  } catch (err) { showError(err.message); }
}

function renderSimilar(items) {
  if (!items.length) return;
  if (portalCfg?.layout?.showSimilar === false) return;
  const TL = { house:'Casa', apartment:'Depto', land:'Terreno', commercial:'Comercial', office:'Oficina', warehouse:'Depósito' };
  const fmt = (p, c) => p ? `${c === 'ARS' ? '$' : 'USD'} ${Number(p).toLocaleString('es')}` : 'Consultar';
  document.getElementById('similarGrid').innerHTML = items.map(p => {
    const photo = esc((p.photos && p.photos[0]) || '');
    return `<a href="/portal/${slug}/propiedad/${p._id}" class="group block sim-card bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-lg transition">
      <div class="relative h-36 overflow-hidden ${photo ? '' : 'photo-placeholder'}">
        ${photo ? `<img src="${photo}" class="w-full h-full object-cover group-hover:scale-105 transition" style="transition-duration:.4s" loading="lazy" onerror="this.parentElement.className='relative h-36 photo-placeholder';this.remove()"/>` : ''}
        <p class="absolute bottom-2 left-2 text-sm font-extrabold text-white drop-shadow" style="text-shadow:0 1px 4px rgba(0,0,0,.6)">${esc(fmt(p.price, p.currency))}</p>
      </div>
      <div class="p-3">
        <p class="text-[11px] font-semibold text-gray-400 uppercase mb-0.5">${esc(TL[p.type] || p.type)}${p.zone ? ' · ' + esc(p.zone) : ''}</p>
        <p class="text-xs font-semibold text-gray-800 leading-snug line-clamp-2 group-hover:text-[color:var(--primary)] transition">${esc(p.title)}</p>
        <div class="flex gap-2 mt-1.5 text-[11px] text-gray-400">
          ${p.beds ? `<span>🛏 ${p.beds}</span>` : ''}${p.baths ? `<span>🚿 ${p.baths}</span>` : ''}${p.area ? `<span>📐 ${p.area}m²</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
  document.getElementById('similarSection').classList.remove('hidden');
}

function applyBranding(p) {
  portalCfg = p;
  document.documentElement.style.setProperty('--primary', p.primaryColor || '#6366F1');
  document.documentElement.style.setProperty('--primary-dark',
    (p.secondaryColor && p.secondaryColor.trim()) ? p.secondaryColor : shade(p.primaryColor || '#6366F1', -18));
  document.getElementById('navAgencyName').textContent = p.agencyName || '';
  document.getElementById('navLogoImg').textContent    = (p.agencyName||'A')[0].toUpperCase();
  document.getElementById('backLink').href = `/portal/${slug}`;
  document.getElementById('agencyName').textContent  = p.agencyName || '';
  document.getElementById('agencyEmail').textContent = p.email  || '';
  document.getElementById('agencyPhone').textContent = p.whatsapp ? '📱 ' + p.whatsapp : '';
  const fa = document.getElementById('footerAgency'); if (fa) fa.textContent = p.agencyName || '';

  // Logo: image > emoji > initial
  const navLogo = document.getElementById('navLogoImg');
  if (p.logoUrl)        navLogo.innerHTML = `<img src="${p.logoUrl}" class="w-full h-full object-cover rounded-lg"/>`;
  else if (p.logoEmoji) navLogo.textContent = p.logoEmoji;

  // Nav WhatsApp (generic, no property text yet — refined in renderProperty)
  const generic = waLink(p.whatsapp, `Hola ${p.agencyName || ''}, quiero más información.`);
  if (generic) {
    const wa = document.getElementById('navWhatsApp');
    wa.href = generic; wa.classList.remove('hidden');
  }

  // Typography (Google Font pair)
  applyFontPair(p.heroFont);

  // Layout: dark mode + card style + radius/buttons/density + visibility
  const lay = p.layout || {};
  document.body.classList.toggle('portal-dark', !!lay.darkMode);
  document.body.classList.remove('cards-rounded', 'cards-sharp', 'cards-flat');
  document.body.classList.add('cards-' + (lay.cardStyle || 'rounded'));
  document.documentElement.style.setProperty('--radius', ((typeof lay.radius === 'number') ? lay.radius : 16) + 'px');
  document.body.classList.remove('btn-solid', 'btn-outline', 'btn-pill');
  document.body.classList.add('btn-' + (lay.buttonStyle || 'solid'));
  document.body.classList.remove('density-compact', 'density-comfortable', 'density-spacious');
  document.body.classList.add('density-' + (lay.density || 'comfortable'));
  if (lay.showContact === false) document.getElementById('contactCard')?.classList.add('hidden');

  // Footer social icons
  renderSocial((p.sections && p.sections.social) || {});
}

// ── Typography: Google Font pairs ─────────────────────────────────────────────
const FONT_PAIRS = {
  '':         { heading:'Plus Jakarta Sans',  body:'Inter',      g:'Plus+Jakarta+Sans:wght@500;700;800|Inter:wght@400;500;600' },
  'elegante': { heading:'Playfair Display',   body:'Lora',       g:'Playfair+Display:wght@600;700;800|Lora:wght@400;500' },
  'impacto':  { heading:'Montserrat',         body:'Roboto',     g:'Montserrat:wght@600;700;800|Roboto:wght@400;500' },
  'lujo':     { heading:'Cormorant Garamond', body:'Montserrat', g:'Cormorant+Garamond:wght@600;700|Montserrat:wght@400;500' },
  'amigable': { heading:'Poppins',            body:'Inter',      g:'Poppins:wght@500;600;700;800|Inter:wght@400;500' },
  'clasica':  { heading:'Lora',               body:'Montserrat', g:'Lora:wght@500;600;700|Montserrat:wght@400;500' },
  'creativa': { heading:'Space Grotesk',      body:'Inter',      g:'Space+Grotesk:wght@500;600;700|Inter:wght@400;500' },
  'minimal':  { heading:'Inter',              body:'Inter',      g:'Inter:wght@400;600;700;800' },
};

function applyFontPair(key) {
  const fp = FONT_PAIRS[key] || FONT_PAIRS[''];
  if (fp.g) {
    const id = 'gfont-' + (key || 'default');
    if (!document.getElementById(id)) {
      const l = document.createElement('link');
      l.id = id; l.rel = 'stylesheet';
      l.href = `https://fonts.googleapis.com/css2?family=${fp.g}&display=swap`;
      document.head.appendChild(l);
    }
  }
  document.documentElement.style.setProperty('--font-heading', `'${fp.heading}'`);
  document.documentElement.style.setProperty('--font-body', `'${fp.body}'`);
}

  const box = document.getElementById('footerSocial');
  if (!box) return;
  const toUrl = (v, base) => {
    if (!v) return '';
    if (/^https?:\/\//i.test(v)) return v;
    return base + v.replace(/^@/, '');
  };
  const items = [
    { url: toUrl(soc.instagram, 'https://instagram.com/'), label: 'Instagram', icon: 'M12 2.2c3.2 0 3.6 0 4.8.1 1.2.1 1.8.2 2.2.4.6.2 1 .5 1.4.9.4.4.7.8.9 1.4.2.4.3 1 .4 2.2.1 1.2.1 1.6.1 4.8s0 3.6-.1 4.8c-.1 1.2-.2 1.8-.4 2.2-.2.6-.5 1-.9 1.4-.4.4-.8.7-1.4.9-.4.2-1 .3-2.2.4-1.2.1-1.6.1-4.8.1s-3.6 0-4.8-.1c-1.2-.1-1.8-.2-2.2-.4a3.8 3.8 0 0 1-1.4-.9 3.8 3.8 0 0 1-.9-1.4c-.2-.4-.3-1-.4-2.2C2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.8c.1-1.2.2-1.8.4-2.2.2-.6.5-1 .9-1.4.4-.4.8-.7 1.4-.9.4-.2 1-.3 2.2-.4C8.4 2.2 8.8 2.2 12 2.2m0 1.8c-3.1 0-3.5 0-4.7.1-.9 0-1.4.2-1.7.3-.4.2-.7.4-1 .7-.3.3-.5.6-.7 1-.1.3-.3.8-.3 1.7-.1 1.2-.1 1.6-.1 4.7s0 3.5.1 4.7c0 .9.2 1.4.3 1.7.2.4.4.7.7 1 .3.3.6.5 1 .7.3.1.8.3 1.7.3 1.2.1 1.6.1 4.7.1s3.5 0 4.7-.1c.9 0 1.4-.2 1.7-.3.4-.2.7-.4 1-.7.3-.3.5-.6.7-1 .1-.3.3-.8.3-1.7.1-1.2.1-1.6.1-4.7s0-3.5-.1-4.7c0-.9-.2-1.4-.3-1.7a2.7 2.7 0 0 0-.7-1 2.7 2.7 0 0 0-1-.7c-.3-.1-.8-.3-1.7-.3-1.2-.1-1.6-.1-4.7-.1m0 3.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8m0 8a3.1 3.1 0 1 0 0-6.2 3.1 3.1 0 0 0 0 6.2m6.3-8.2a1.1 1.1 0 1 1-2.3 0 1.1 1.1 0 0 1 2.3 0' },
    { url: toUrl(soc.facebook, 'https://facebook.com/'),  label: 'Facebook',  icon: 'M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07' },
    { url: toUrl(soc.tiktok, 'https://tiktok.com/@'),     label: 'TikTok',    icon: 'M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64c.3 0 .59.05.86.13V9.4a6.33 6.33 0 0 0-1-.05A6.34 6.34 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z' },
    { url: soc.website || '', label: 'Sitio web', icon: 'M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20m0 2c1.5 0 3.4 2.6 3.8 6H8.2C8.6 6.6 10.5 4 12 4M4.3 11h3.4c.1 1 .2 2 .5 3H5.1A8 8 0 0 1 4.3 11m0 2h3.6c.4 1.4 1 2.6 1.6 3.5A8 8 0 0 1 4.3 13m4-2H16c-.1 1.1-.3 2.1-.6 3H8.9c-.3-.9-.5-1.9-.6-3m7.7-2h3.7a8 8 0 0 1-.8 3h-3.4c.3-1 .4-2 .5-3m-3.7 11c-1.5 0-3.4-2.6-3.8-6h7.6c-.4 3.4-2.3 6-3.8 6m2.1-.5c.6-.9 1.2-2.1 1.6-3.5h2.5a8 8 0 0 1-4.1 3.5M16.3 9c-.1-1-.2-2-.5-3h2.6c.4.9.7 1.9.8 3z' },
  ].filter(s => s.url);
  box.innerHTML = items.map(s =>
    `<a href="${esc(s.url)}" target="_blank" rel="noopener" title="${s.label}" aria-label="${s.label}"
        class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition">
       <svg style="width:18px;height:18px" fill="currentColor" viewBox="0 0 24 24"><path d="${s.icon}"/></svg>
     </a>`).join('');
}

function renderProperty(p, portal) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

  // SEO title for in-app navigation (server already injected meta tags for crawlers)
  document.title = p.title + ' — ' + portal.agencyName;

  // Badges
  document.getElementById('opBadge').textContent   = OP_LABELS[p.operation] || p.operation;
  document.getElementById('opBadge').className     = `text-xs font-bold px-3 py-1 rounded-full ${OP_COLORS[p.operation] || 'bg-gray-100 text-gray-600'}`;
  document.getElementById('typeBadge').textContent = TYPE_LABELS[p.type] || p.type;
  document.getElementById('statusBadge').textContent = STATUS_LABELS[p.status] || p.status;
  document.getElementById('statusBadge').className   = `text-xs font-semibold px-3 py-1 rounded-full ${STATUS_COLORS[p.status] || 'bg-gray-100'}`;

  // Title + address
  document.getElementById('propTitle').textContent = p.title;
  const addrText = [p.address, p.zone].filter(Boolean).join(' — ');
  if (addrText) {
    document.getElementById('propAddressText').textContent = addrText;
  } else {
    document.getElementById('propAddress').classList.add('hidden');
  }

  // Price
  const sym = p.currency === 'ARS' ? '$' : 'USD';
  document.getElementById('propPrice').textContent = p.price ? `${sym} ${Number(p.price).toLocaleString('es')}` : 'Consultar precio';

  // Stats
  const stats = [
    p.beds     && { label:'Ambientes', value: p.beds,     icon:'🛏' },
    p.baths    && { label:'Baños',     value: p.baths,    icon:'🚿' },
    p.area     && { label:'Sup. cub.', value: p.area+'m²',icon:'📐' },
    p.areaTotal&& { label:'Sup. total',value: p.areaTotal+'m²',icon:'🏡' },
    p.parking  && { label:'Cocheras',  value: p.parking,  icon:'🚗' },
    p.floor!=null&&p.floor!==undefined && { label:'Piso', value: p.floor, icon:'🏢' },
    p.age!=null  && { label:'Antigüedad', value: p.age+' años', icon:'📅' },
  ].filter(Boolean);

  document.getElementById('statsGrid').innerHTML = stats.map(s =>
    `<div class="bg-white rounded-xl border border-gray-100 p-3 text-center shadow-sm">
       <p class="text-lg mb-0.5">${s.icon}</p>
       <p class="text-sm font-bold text-gray-900">${s.value}</p>
       <p class="text-xs text-gray-400">${s.label}</p>
     </div>`
  ).join('');

  // Description
  if (p.description) {
    document.getElementById('propDesc').textContent = p.description;
    document.getElementById('descSection').classList.remove('hidden');
  }

  // Features
  if (p.features?.length) {
    document.getElementById('featList').innerHTML = p.features.map(f => `<span class="feature-chip">${esc(f)}</span>`).join('');
    document.getElementById('featSection').classList.remove('hidden');
  }

  // Photos — ZonaProp-style mosaic
  photos = p.photos || [];
  if (photos.length) renderGallery(photos);
  else document.getElementById('noPhoto').classList.remove('hidden');

  // Location map (uses address/zone — no API key needed)
  const place = [p.address, p.zone].filter(Boolean).join(', ');
  if (place && portal?.layout?.showMap !== false) {
    const q = encodeURIComponent(place);
    document.getElementById('mapAddr').textContent  = place;
    document.getElementById('mapFrame').src         = `https://maps.google.com/maps?q=${q}&z=15&output=embed`;
    document.getElementById('mapOpen').href         = `https://www.google.com/maps/search/?api=1&query=${q}`;
    document.getElementById('mapSection').classList.remove('hidden');
  }

  // WhatsApp CTA + floating button + nav (all with property-specific message)
  const link = waLink(portal.whatsapp, `Hola ${portal.agencyName || ''}, me interesa la propiedad: "${p.title}" — ${location.href}`);
  if (link) {
    const waCta = document.getElementById('waCta');
    waCta.href = link; waCta.classList.remove('hidden');
    const flo = document.getElementById('waFloat');
    flo.href = link; flo.classList.remove('hidden');
    const nav = document.getElementById('navWhatsApp');
    nav.href = link; nav.classList.remove('hidden');
    const pw = document.getElementById('priceWa');
    if (pw) { pw.href = link; pw.classList.remove('hidden'); }
  }
}

/** Build the ZonaProp-style mosaic: 1 big + up to 4 thumbnails. */
function renderGallery(ph) {
  const cont = document.getElementById('gallery');
  const tile = (i, cls, extra = '') =>
    `<div class="${cls} relative rounded-xl overflow-hidden cursor-pointer" onclick="openLightbox(${i})">
       <img src="${esc(ph[i])}" loading="lazy" onerror="this.parentElement.classList.add('photo-placeholder');this.remove()"/>
       ${extra}</div>`;
  const tiles = [tile(0, 'g-big',
    `<span class="absolute bottom-2 left-2 bg-black/55 text-white text-xs font-semibold px-2.5 py-1 rounded-full flex items-center gap-1.5">
       <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
       ${ph.length} ${ph.length === 1 ? 'foto' : 'fotos'}</span>`)];
  for (let i = 1; i < Math.min(ph.length, 5); i++) {
    const isLast = i === 4 && ph.length > 5;
    const overlay = isLast
      ? `<div class="absolute inset-0 bg-black/55 hover:bg-black/65 transition text-white flex flex-col items-center justify-center font-bold text-sm">
           <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
           Ver todas (${ph.length})</div>`
      : '';
    tiles.push(tile(i, 'g-thumb', overlay));
  }
  cont.innerHTML = `<div class="gallery-mosaic">${tiles.join('')}</div>`;
}

function setPhoto(idx) {
  if (!photos.length) return;
  currentPhotoIdx = (idx + photos.length) % photos.length;
  document.getElementById('lightboxImg').src = photos[currentPhotoIdx];
  const lc = document.getElementById('lightboxCounter');
  if (lc) lc.textContent = `${currentPhotoIdx + 1} / ${photos.length}`;
}

function stepPhoto(dir) { setPhoto(currentPhotoIdx + dir); }

function openLightbox(idx) {
  if (!photos.length) return;
  currentPhotoIdx = typeof idx === 'number' ? idx : currentPhotoIdx;
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = photos[currentPhotoIdx];
  document.getElementById('lightboxCounter').textContent = `${currentPhotoIdx + 1} / ${photos.length}`;
  lb.classList.remove('hidden'); lb.classList.add('flex');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.add('hidden'); lb.classList.remove('flex');
  document.body.style.overflow = '';
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const lbOpen = !document.getElementById('lightbox').classList.contains('hidden');
  if (e.key === 'Escape' && lbOpen) closeLightbox();
  if (!photos.length) return;
  if (e.key === 'ArrowRight') stepPhoto(1);
  if (e.key === 'ArrowLeft')  stepPhoto(-1);
});

function showError(msg) {
  document.getElementById('loading').innerHTML = `<p class="col-span-3 text-center py-20 text-gray-400">${msg}</p>`;
}

// Contact form
document.getElementById('contactForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('contactBtn');
  btn.disabled = true; btn.textContent = 'Enviando…';
  document.getElementById('contactSuccess').classList.add('hidden');
  document.getElementById('contactError').classList.add('hidden');
  try {
    const resp = await fetch(`${API}/api/portal/${slug}/contact`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:       document.getElementById('cName').value.trim(),
        phone:      document.getElementById('cPhone').value.trim(),
        email:      document.getElementById('cEmail').value.trim(),
        message:    document.getElementById('cMsg').value.trim(),
        propertyId: propId,
      }),
    });
    if (!resp.ok) { const d = await resp.json(); throw new Error(d.error || 'Error'); }
    document.getElementById('contactSuccess').classList.remove('hidden');
    document.getElementById('contactForm').reset();
  } catch (err) {
    const el = document.getElementById('contactError');
    el.textContent = err.message; el.classList.remove('hidden');
  } finally { btn.disabled=false; btn.textContent='Enviar consulta'; }
};

// ── Portal AI assistant ───────────────────────────────────────────────────────
let _paHistory = [];
function paLinkify(text) {
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/\[\[([^\]|]+)\|([a-f0-9]{24})\]\]/gi,
    (_, title, id) => `<a href="/portal/${slug}/propiedad/${id}" style="color:var(--primary);font-weight:700;text-decoration:underline">${title} ›</a>`);
}
function togglePortalBot() {
  const panel = document.getElementById('paPanel');
  const open = panel.classList.contains('hidden');
  panel.classList.toggle('hidden', !open);
  panel.classList.toggle('flex', open);
  document.getElementById('paBtn').style.display = open ? 'none' : 'flex';
  if (open) {
    if (!document.getElementById('paMsgs').children.length) {
      addPortalMsg('assistant', `¡Hola! 👋 Soy el asistente de ${portalCfg.agencyName || 'la inmobiliaria'}. ¿Te ayudo con esta propiedad o buscás otra cosa? Contame zona, tipo y presupuesto.`);
    }
    setTimeout(() => document.getElementById('paInput').focus(), 100);
  }
}
function addPortalMsg(role, text) {
  const wrap = document.getElementById('paMsgs');
  const me = role === 'user';
  const b = document.createElement('div');
  b.style.cssText = `max-width:85%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.45;white-space:pre-wrap;${me
    ? 'align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px'
    : 'align-self:flex-start;background:#fff;color:#1f2937;border:1px solid #e5e7eb;border-bottom-left-radius:4px'}`;
  if (me) b.textContent = text; else b.innerHTML = paLinkify(text);
  wrap.appendChild(b); wrap.scrollTop = wrap.scrollHeight;
  return b;
}
async function sendPortalBot() {
  const input = document.getElementById('paInput');
  const q = input.value.trim(); if (!q) return;
  input.value = '';
  addPortalMsg('user', q);
  _paHistory.push({ role: 'user', content: q });
  const typing = addPortalMsg('assistant', '…');
  try {
    const resp = await fetch(`${API}/api/portal/${slug}/assistant`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: _paHistory }),
    });
    const d = await resp.json();
    if (!resp.ok) throw new Error(d.error || 'Error');
    typing.innerHTML = paLinkify(d.reply);
    _paHistory.push({ role: 'assistant', content: d.reply });
    if (d.leadCaptured) addPortalMsg('assistant', '✅ ¡Listo! Un asesor te va a contactar a la brevedad.');
  } catch (err) { typing.textContent = 'Disculpá, no pude responder ahora. ' + (err.message || ''); }
}

fetch(`${API}/api/version`).then(r => r.json()).then(d => {
  const el = document.getElementById('appVersion');
  if (el && d.version) el.textContent = '· v' + d.version;
}).catch(() => {});
init();
</script>
